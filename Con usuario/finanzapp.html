        {/* Preview */}
        <div style={{background:INPUT,borderRadius:12,padding:"12px 14px",marginBottom:16,border:`1px solid ${INPBORD}`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:12,background:catForm.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{catForm.icon}</div>
          <div style={{fontWeight:700,fontSize:16,color:TXT}}>{catForm.label||"Vista previa"}</div>
        </div>

        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setCatModal(false);setEditCat(null);}} style={{flex:1,background:SECBTN,border:"none",color:TXT2,borderRadius:12,padding:"12px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:13}}>Cancelar</button>
          <button onClick={saveCat} style={{flex:2,background:`linear-gradient(135deg,${accent},${accent}bb)`,border:"none",color:"#0f172a",borderRadius:12,padding:"13px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:14}}>💾 Guardar</button>
        </div>
      </Modal>}

      {/* MODAL: VIEW RECEIPT */}
      {viewReceiptGasto && <div style={{position:"fixed",inset:0,background:"#000c",zIndex:300,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>{setViewReceiptGasto(null);setSignedReceiptUrl(null);}}>
        <div style={{background:MODBG,borderRadius:20,padding:16,maxWidth:400,width:"100%",maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontWeight:700,color:TXT,fontSize:15}}>{viewReceiptGasto.descripcion}</div>
              <div style={{fontSize:12,color:TXT3}}>{viewReceiptGasto.fecha} · {fmt(viewReceiptGasto.monto,sym)}</div>
            </div>
            <button onClick={()=>{setViewReceiptGasto(null);setSignedReceiptUrl(null);}} style={{background:"none",border:"none",color:TXT3,fontSize:22,cursor:"pointer",padding:4}}>✕</button>
          </div>

          {!signedReceiptUrl
            ? <div style={{textAlign:"center",padding:"40px 0",color:TXT3}}>
                <div style={{fontSize:32,marginBottom:8,animation:"pulse 1s ease-in-out infinite"}}>🔐</div>
                <div style={{fontSize:13}}>{lang==="he"?"טוען קבלה...":lang==="en"?"Loading receipt...":"Cargando recibo..."}</div>
              </div>
            : <>
                <img src={signedReceiptUrl} alt="recibo"
                  style={{width:"100%",borderRadius:12,objectFit:"contain",maxHeight:"60vh",background:"#000"}}
                  onError={e=>{e.target.style.display="none"; e.target.nextSibling.style.display="block";}}/>
                <div style={{display:"none",textAlign:"center",padding:20,color:TXT3,fontSize:13}}>
                  {lang==="he"?"לא ניתן לטעון את התמונה":lang==="en"?"Could not load image":"No se pudo cargar la imagen"}
                </div>
              </>
          }

          <div style={{display:"flex",gap:10,marginTop:12}}>
            {signedReceiptUrl && <button onClick={()=>window.open(signedReceiptUrl,"_blank")}
              style={{flex:1,background:`${accent}22`,border:`1px solid ${accent}44`,color:accent,borderRadius:12,padding:"11px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:13}}>
              🔗 {lang==="he"?"פתח":lang==="en"?"Open":"Abrir"}
            </button>}
            <button onClick={()=>{setViewReceiptGasto(null);setSignedReceiptUrl(null);}}
              style={{flex:1,background:SECBTN,border:"none",color:TXT2,borderRadius:12,padding:"11px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:13}}>
              {t.cancel}
            </button>
          </div>
        </div>
      </div>}

      {/* MODAL: PDF CONTENT */}
      {pdfContent && <div style={{position:"fixed",inset:0,background:BG,zIndex:400,display:"flex",flexDirection:"column"}}>
        <div style={{background:accent,padding:"14px 18px",paddingTop:"calc(env(safe-area-inset-top,0px) + 14px)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"#fff",fontWeight:700,fontSize:16}}>📄 PDF</span>
          <button onClick={()=>setPdfContent(null)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontWeight:700,fontSize:14}}>
            ✕ {t.cancel}
          </button>
        </div>
        <iframe srcDoc={pdfContent} style={{flex:1,border:"none",width:"100%"}} title="PDF Preview"/>
      </div>}

      {/* MODAL: CONFIRM DELETE */}
      {confirmDelete && <div style={{position:"fixed",inset:0,background:"#000a",zIndex:250,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:MODBG,borderRadius:20,padding:24,maxWidth:320,width:"100%",border:`1px solid ${BORDER}`,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
          <div style={{fontSize:16,fontWeight:700,color:TXT,marginBottom:8}}>{confirmDelete.msg}</div>
          <div style={{fontSize:12,color:TXT3,marginBottom:20}}>{lang==="he"?"לא ניתן לבטל פעולה זו":lang==="en"?"This cannot be undone":"Esta acción no se puede deshacer"}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfirmDelete(null)}
              style={{flex:1,background:SECBTN,border:"none",color:TXT2,borderRadius:12,padding:"12px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:14}}>
              {t.cancel}
            </button>
            <button onClick={confirmDeleteAction}
              style={{flex:1,background:"#ef444422",border:"1px solid #ef444444",color:"#f87171",borderRadius:12,padding:"12px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:14}}>
              🗑️ {lang==="he"?"מחק":lang==="en"?"Delete":"Eliminar"}
            </button>
          </div>
        </div>
      </div>}

      {toast && <div style={{position:"fixed",bottom:104,left:"50%",transform:"translateX(-50%)",background:accent,color:"#0f172a",padding:"11px 22px",borderRadius:12,fontWeight:700,fontSize:13,zIndex:200,boxShadow:`0 4px 20px ${accent}66`,whiteSpace:"nowrap",animation:"slideUp .3s ease"}}>{toast}</div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        // Force update check every time
        reg.update();
        console.log('FinanzHome SW ready');
      })
      .catch(err => console.warn('SW:', err));
  });
  // If SW controlling page has issues, reload once
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(sessionStorage.getItem('sw_reload')) return;
    sessionStorage.setItem('sw_reload','1');
  });
}
let _pwaPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _pwaPrompt = e;
  const b=document.getElementById('pwa-install-btn');
  if(b) b.style.display='flex';
});
window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  const b=document.getElementById('pwa-install-btn');
  if(b) b.style.display='none';
});
window.installPWA = () => {
  if(_pwaPrompt){ _pwaPrompt.prompt(); _pwaPrompt.userChoice.then(()=>_pwaPrompt=null); }
};
</script>
</body>
</html>
