const Donut = ({data,total,sym}) => {
  const r=54,cx=70,cy=70,circ=2*Math.PI*r; let off=0;
  const slices = data.map(d => {
    const pct = total>0 ? d.amount/total : 0;
    const s = {...d, dash:pct*circ, gap:circ-pct*circ, offset:off};
    off += s.dash; return s;
  });
  return (
    <svg width={140} height={140} viewBox="0 0 140 140">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e293b" strokeWidth={18}/>
      {slices.map((s,i) => <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={18} strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.offset+circ*.25}/>)}
      <text x={cx} y={cy-6} textAnchor="middle" fill="#94a3b8" fontSize={9} fontWeight={600}>TOTAL</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#f8fafc" fontSize={12} fontWeight={700}>{fmt(total,sym)}</text>
    </svg>
  );
};

const LineChart = ({points,color}) => {
  if(!points||points.length<2) return <div style={{color:"#475569",textAlign:"center",padding:20,fontSize:12}}>Sin datos suficientes</div>;
  const maxV=Math.max(...points.map(p=>p.v),1);
  const W=320,H=90,pL=36,pR=8,pT=8,pB=24;
  const px = i => pL+i*(W/(points.length-1));
  const py = v => pT+H-(v/maxV)*H;
  const d = points.map((p,i)=>`${i===0?"M":"L"}${px(i)},${py(p.v)}`).join(" ");
  const area = [...points.map((p,i)=>`${i===0?"M":"L"}${px(i)},${py(p.v)}`),`L${px(points.length-1)},${pT+H}`,`L${px(0)},${pT+H}`,"Z"].join(" ");
  return (
    <svg width="100%" viewBox={`0 0 ${W+pL+pR} ${H+pT+pB}`}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity={0.3}/><stop offset="100%" stopColor={color} stopOpacity={0}/></linearGradient></defs>
      <path d={area} fill="url(#ag)"/>
      <path d={d} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i) => <circle key={i} cx={px(i)} cy={py(p.v)} r={3} fill={color}/>)}
      {points.map((p,i) => <text key={i} x={px(i)} y={pT+H+16} textAnchor="middle" fill="#64748b" fontSize={9}>{p.label}</text>)}
      {[0,.5,1].map((f,i) => <text key={i} x={pL-4} y={pT+H-f*H+4} textAnchor="end" fill="#475569" fontSize={8}>{Math.round(maxV*f)}</text>)}
    </svg>
  );
};

  // Israeli tax brackets 2024/2025
  const calcMasHachnacha = (income, city="other", isFirstYear=false) => {
    // Tax brackets (annual) - simplified
    const brackets = [
      {max:81480, rate:0.10},
      {max:116760, rate:0.14},
      {max:187440, rate:0.20},
      {max:260520, rate:0.31},
      {max:542160, rate:0.35},
      {max:698280, rate:0.47},
      {max:Infinity, rate:0.50},
    ];
    // Credit points - self employed gets 2.25 base
    const creditPoint = 242; // monthly credit point value 2025
    const annualCredit = creditPoint * 2.25 * 12;
    
    let tax = 0, prev = 0;
    for(const b of brackets) {
      if(income <= prev) break;
      const taxable = Math.min(income, b.max) - prev;
      tax += taxable * b.rate;
      prev = b.max;
    }
    tax = Math.max(0, tax - annualCredit);
    
    // City benefit - Ashkelon and other periphery cities get mas hachnacha reduction
    const CITY_BENEFITS = {
      ashkelon: {masReduction: 0.10, name:"אשקלון", benefit:"הטבת אזור עדיפות לאומית"},
      sderot: {masReduction: 0.12, name:"שדרות", benefit:"הטבת אזור עדיפות לאומית"},
      beer_sheva: {masReduction: 0.07, name:"באר שבע", benefit:"הטבת אזור עדיפות לאומית"},
      eilat: {masReduction: 0.10, name:"אילת", benefit:"הטבת אזור מוגבל"},
      kiryat_shmona: {masReduction: 0.15, name:"קריית שמונה", benefit:"הטבת אזור עדיפות א"},
      afula: {masReduction: 0.07, name:"עפולה", benefit:"הטבת אזור עדיפות"},
    };
    
    const cityBenefit = CITY_BENEFITS[city];
    const cityReduction = cityBenefit ? tax * cityBenefit.masReduction : 0;
    const firstYearReduction = isFirstYear ? Math.min(income * 0.05, 5000) : 0;
    
    const finalTax = Math.max(0, tax - cityReduction - firstYearReduction);
    return {
      grossTax: Math.round(tax),
      cityReduction: Math.round(cityReduction),
      firstYearReduction: Math.round(firstYearReduction),
      finalTax: Math.round(finalTax),
      cityBenefit,
    };
  };

  const calcBituajLeumi = (income, type="patur") => {
    // 2025 rates for self-employed
    const lowThreshold = 7522 * 12; // ~90,264 annual
    const lowRate = 0.0687;
    const highRate = 0.1187;
    const healthRate = 0.05; // בריאות
    
    let bl = 0;
    if(income <= lowThreshold) {
      bl = income * lowRate;
    } else {
      bl = lowThreshold * lowRate + (income - lowThreshold) * highRate;
    }
    const health = income * healthRate;
    return { bituajLeumi: Math.round(bl), health: Math.round(health), total: Math.round(bl + health) };
  };

  const calcMaam = (income, type) => {
    if(type==="patur") return {maam:0, note:"פטור ממע\"מ (הכנסה מתחת לתקרה)"};
    const THRESHOLD_2025 = 120000;
    if(income < THRESHOLD_2025 && type==="patur") return {maam:0, note:"מתחת לתקרת פטור"};
    return {maam: Math.round(income * 0.18), note:"מע\"מ 18% על הכנסות", quarterly: Math.round(income * 0.18 / 4)};
  };

    const annual = monthly * 12;

    const taxDeduction = Math.min(annual * 0.35, annual); // simplified
    return {monthly: Math.round(monthly), annual: Math.round(annual), taxDeduction: Math.round(taxDeduction)};
  };

              const over = budget>0 && gasto>budget;

              return <div key={cat.id} style={{marginBottom:16,padding:"12px 14px",background:over?`#f8717108`:INPUT,borderRadius:12,border:`1px solid ${over?"#f8717133":INPBORD}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:20}}>{cat.icon}</span>
                    <span style={{fontSize:15,fontWeight:600,color:TXT}}>{getCatLabel(cat.id, CATS, lang)}</span>
                    {over && <span style={{background:"#ef444422",color:"#f87171",fontSize:11,borderRadius:6,padding:"2px 8px",fontWeight:700}}>⚠ {t.exceeded}</span>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:16,fontWeight:700,color:over?"#f87171":accent}}>{fmt(gasto,sym)}</span>
                    {budget>0 && <span style={{fontSize:13,color:TXT3}}> / {fmt(budget,sym)}</span>}
                  </div>
                </div>
                {editBudget
                  ? <input type="text" inputMode="decimal" placeholder={`${t.budget}...`}
                      value={budgets[cat.id]||""}
                      onChange={e=>{const v=e.target.value.replace(",",".");const nd={...budgets,[cat.id]:parseFloat(v)||0};setBudgets(nd);saveBudget(nd);}}
                      style={{width:"100%",background:CARD,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"10px 12px",fontSize:15,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
                  : <Bar pct={budget>0?(gasto/budget)*100:0} color={over?"#f87171":cat.color}/>
                }
                {!editBudget && budget>0 && <div style={{fontSize:12,color:TXT3,marginTop:4}}>
                  {over
                    ? `${t.exceeded}: ${fmt(gasto-budget,sym)}`
                    : `${lang==="he"?"נותר":lang==="en"?"Remaining":"Resta"}: ${fmt(budget-gasto,sym)}`}
                </div>}
              </div>;
            })}
          </Card>
        </div>}

        {/* ── STATS TAB ── */}
        {tab==="stats" && <div>

          {/* Year selector */}
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",justifyContent:"center",flexWrap:"wrap"}}>
            {(availableYears.length>0?availableYears:[String(new Date().getFullYear())]).map(y=>(
              <button key={y} onClick={()=>setStatsYear(parseInt(y))}
                style={{background:statsYear===parseInt(y)?`${accent}22`:CARD,border:`1px solid ${statsYear===parseInt(y)?accent:BORDER}`,borderRadius:20,padding:"7px 18px",cursor:"pointer",fontSize:13,fontWeight:statsYear===parseInt(y)?700:400,color:statsYear===parseInt(y)?accent:TXT,fontFamily:"'Rubik',sans-serif"}}>
                {y}
              </button>
            ))}
          </div>

          {/* View selector */}
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {[["yearly",lang==="he"?"שנתי":lang==="en"?"Annual":"Anual"],["compare",lang==="he"?"השוואה":lang==="en"?"Compare":"Comparar"],["category",lang==="he"?"קטגוריות":lang==="en"?"Categories":"Categorías"]].map(([id,label])=>(
              <button key={id} onClick={()=>setStatsView(id)}
                style={{flex:1,background:statsView===id?`${accent}22`:CARD,border:`1px solid ${statsView===id?accent:BORDER}`,borderRadius:12,padding:"9px 4px",cursor:"pointer",fontSize:11,fontWeight:statsView===id?700:400,color:statsView===id?accent:TXT,fontFamily:"'Rubik',sans-serif"}}>
                {label}
              </button>
            ))}
          </div>

          {/* ── YEARLY VIEW ── */}
          {statsView==="yearly" && (() => {
            const monthly = monthlyByYear(statsYear);
            const total = yearTotal(statsYear);
            const avg = Math.round(total/12);
            const maxMonth = monthly.reduce((a,b)=>b.total>a.total?b:a,{total:0});
            const minMonth = monthly.filter(m=>m.total>0).reduce((a,b)=>b.total<a.total?b:a,monthly[0]);
            const split = splitByType(statsYear);

            return <div>
              {/* Year summary cards */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{background:`${accent}15`,borderRadius:14,padding:"14px",border:`1px solid ${accent}33`,textAlign:"center"}}>
                  <div style={{fontSize:11,color:accent,marginBottom:4}}>{lang==="he"?"סה\"כ שנתי":lang==="en"?"Annual total":"Total anual"}</div>
                  <div style={{fontSize:26,fontWeight:700,color:accent}}>{fmt(total,sym)}</div>
                </div>
                <div style={{background:CARD,borderRadius:14,padding:"14px",border:`1px solid ${BORDER}`,textAlign:"center"}}>
                  <div style={{fontSize:11,color:TXT3,marginBottom:4}}>{lang==="he"?"ממוצע חודשי":lang==="en"?"Monthly avg":"Promedio mensual"}</div>
                  <div style={{fontSize:22,fontWeight:700,color:TXT}}>{fmt(avg,sym)}</div>
                </div>
                <div style={{background:"#f8717115",borderRadius:14,padding:"12px",border:"1px solid #f8717133",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#f87171",marginBottom:2}}>{lang==="he"?"חודש יקר":lang==="en"?"Highest month":"Mes más caro"}</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#f87171"}}>{mNames[parseInt(maxMonth.month)-1]}</div>
                  <div style={{fontSize:12,color:"#f87171"}}>{fmt(maxMonth.total,sym)}</div>
                </div>
                <div style={{background:"#4ade8015",borderRadius:14,padding:"12px",border:"1px solid #4ade8033",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#4ade80",marginBottom:2}}>{lang==="he"?"חודש זול":lang==="en"?"Lowest month":"Mes más bajo"}</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#4ade80"}}>{mNames[parseInt(minMonth.month)-1]}</div>
                  <div style={{fontSize:12,color:"#4ade80"}}>{fmt(minMonth.total,sym)}</div>
                </div>
              </div>

              {/* Business vs Home */}
              <div style={{background:CARD,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${BORDER}`}}>
                <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:10}}>🏢 {lang==="he"?"עסק":lang==="en"?"Business":"Negocio"} vs 🏠 {lang==="he"?"בית":lang==="en"?"Home":"Hogar"}</div>
                <div style={{display:"flex",gap:10,marginBottom:10}}>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#60a5fa",marginBottom:2}}>🏢 {lang==="he"?"עסק":lang==="en"?"Business":"Negocio"}</div>
                    <div style={{fontSize:18,fontWeight:700,color:"#60a5fa"}}>{fmt(split.business,sym)}</div>
                    <div style={{fontSize:11,color:TXT3}}>{total>0?Math.round((split.business/total)*100):0}%</div>
                  </div>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#4ade80",marginBottom:2}}>🏠 {lang==="he"?"בית":lang==="en"?"Home":"Hogar"}</div>
                    <div style={{fontSize:18,fontWeight:700,color:"#4ade80"}}>{fmt(split.home,sym)}</div>
                    <div style={{fontSize:11,color:TXT3}}>{total>0?Math.round((split.home/total)*100):0}%</div>
                  </div>
                </div>
                <div style={{height:10,borderRadius:5,background:SECBTN,overflow:"hidden",display:"flex"}}>
                  <div style={{height:"100%",width:`${total>0?(split.business/total)*100:50}%`,background:"#60a5fa",transition:"width .5s"}}/>
                  <div style={{height:"100%",flex:1,background:"#4ade80"}}/>
                </div>
              </div>

              {/* Monthly bar chart */}
              <div style={{background:CARD,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${BORDER}`}}>
                <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>{lang==="he"?"הוצאות לפי חודש":lang==="en"?"Monthly expenses":"Gastos por mes"} — {statsYear}</div>
                {(() => {
                  const maxVal = Math.max(...monthly.map(m=>m.total), 1);
                  return <div>
                    {monthly.map((m,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{fontSize:10,color:TXT3,width:28,textAlign:"right",flexShrink:0}}>{mNames[i]?.slice(0,3)}</div>
                        <div style={{flex:1,height:18,background:SECBTN,borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${(m.total/maxVal)*100}%`,background:m.total===maxVal.total?"#f87171":accent,borderRadius:4,minWidth:m.total>0?4:0,transition:"width .3s"}}/>
                        </div>
                        <div style={{fontSize:11,fontWeight:600,color:m.total>0?TXT:TXT3,width:70,textAlign:"right",flexShrink:0}}>{m.total>0?fmt(m.total,sym):"—"}</div>
                      </div>
                    ))}
                  </div>;
                })()}
              </div>

              {/* Payment method stats */}
              <Card>
                <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>💳 {t.byPaymentMethod} — {statsYear}</div>
                {[
                  ["cash","💵",t.cash,"#4ade80"],
                  ["transfer","🏦",t.bankTransfer,"#60a5fa"],
                  ["card","💳",t.creditCard,"#a78bfa"],
                  ["voucher","🎫",t.voucher,"#fb923c"],
                  ["installments","📋",t.installments,"#f472b6"],
                ].map(([method,icon,label,color])=>{
                  const methodTotal = gastos.filter(g=>g.mes?.startsWith(String(statsYear))&&(g.payment_method||"cash")===method).reduce((s,g)=>s+(g.monto||0),0);
                  if(methodTotal===0) return null;
                  const pct = total>0?Math.round((methodTotal/total)*100):0;
                  return <div key={method} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:13,color:TXT}}>{icon} {label}</span>
                      <div>
                        <span style={{fontSize:13,fontWeight:700,color}}>{fmt(Math.round(methodTotal),sym)}</span>
                        <span style={{fontSize:11,color:TXT3,marginLeft:6}}>{pct}%</span>
                      </div>
                    </div>
                    <div style={{height:8,background:SECBTN,borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:4}}/>
                    </div>
                  </div>;
                })}

                {/* Installments pending */}
                {(() => {
                  const pending = gastos.filter(g=>g.payment_method==="installments"&&g.installments>1&&(g.installments-(g.installments_paid||0))>0);
                  if(pending.length===0) return null;
                  return <div style={{marginTop:12,background:INPUT,borderRadius:10,padding:12,border:`1px solid ${INPBORD}`}}>
                    <div style={{fontSize:11,fontWeight:700,color:TXT,marginBottom:8}}>📋 {t.installmentsLeft}</div>
                    {pending.slice(0,5).map(g=>{
                      const left = g.installments - (g.installments_paid||0);
                      const perInstallment = g.monto/g.installments;
                      return <div key={g.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${BORDER}`,fontSize:12}}>
                        <div>
                          <div style={{color:TXT,fontWeight:600}}>{g.descripcion}</div>
                          <div style={{color:TXT3,fontSize:10}}>{left}/{g.installments} {t.installmentsLeft}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{color:"#f87171",fontWeight:700}}>{fmt(perInstallment*left,sym)}</div>
                          <div style={{color:TXT3,fontSize:10}}>{fmt(perInstallment,sym)}/mes</div>
                        </div>
                      </div>;
                    })}
                  </div>;
                })()}

                {/* Cards detail */}
                {creditCards.length>0 && <div style={{marginTop:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:TXT,marginBottom:8}}>💳 {lang==="he"?"פירוט כרטיסים":lang==="en"?"Cards detail":"Detalle tarjetas"}</div>
                  {creditCards.map(card=>{
                    const cardTotal = gastos.filter(g=>g.mes?.startsWith(String(statsYear))&&g.card_id===card.id).reduce((s,g)=>s+(g.monto||0),0);
                    if(cardTotal===0) return null;
                    return <div key={card.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${BORDER}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:card.color}}/>
                        <span style={{fontSize:12,color:TXT}}>{card.name} {card.last4?"··"+card.last4:""}</span>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:card.color}}>{fmt(Math.round(cardTotal),sym)}</span>
                    </div>;
                  })}
                </div>}
              </Card>
              <div style={{background:CARD,borderRadius:16,padding:16,border:`1px solid ${BORDER}`,overflowX:"auto"}}>
                <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>
                  {lang==="he"?"חודש × קטגוריה":lang==="en"?"Month × Category":"Mes × Categoría"} — {statsYear}
                </div>
                {(() => {
                  const topCats = catTotalByYear(statsYear).slice(0,6);
                  return <div style={{minWidth:320}}>
                    {/* Header */}
                    <div style={{display:"grid",gridTemplateColumns:`70px ${topCats.map(()=>"1fr").join(" ")}`,gap:4,marginBottom:6}}>
                      <div/>
                      {topCats.map(c=>(
                        <div key={c.id} style={{fontSize:9,color:TXT3,textAlign:"center",fontWeight:700}}>{c.icon}</div>
                      ))}
                    </div>
                    {monthly.map((m,i)=>{
                      const rowTotal = gastos.filter(g=>g.mes===m.mes).reduce((s,g)=>s+(g.monto||0),0);
                      if(rowTotal===0) return null;
                      return <div key={i} style={{display:"grid",gridTemplateColumns:`70px ${topCats.map(()=>"1fr").join(" ")}`,gap:4,marginBottom:4,background:i%2===0?INPUT:"transparent",borderRadius:6,padding:"4px 2px"}}>
                        <div style={{fontSize:10,color:TXT,fontWeight:600,padding:"2px 4px"}}>{mNames[i]}</div>
                        {topCats.map(c=>{
                          const val = gastos.filter(g=>g.mes===m.mes&&g.categoria===c.id).reduce((s,g)=>s+(g.monto||0),0);
                          return <div key={c.id} style={{fontSize:9,color:val>0?TXT:TXT3,textAlign:"center",padding:"2px"}}>{val>0?`${sym}${Math.round(val).toLocaleString()}`:"—"}</div>;
                        })}
                      </div>;
                    })}
                    {/* Totals row */}
                    <div style={{display:"grid",gridTemplateColumns:`70px ${topCats.map(()=>"1fr").join(" ")}`,gap:4,marginTop:6,borderTop:`1px solid ${BORDER}`,paddingTop:6}}>
                      <div style={{fontSize:10,color:accent,fontWeight:700,padding:"2px 4px"}}>סה"כ</div>
                      {topCats.map(c=>(
                        <div key={c.id} style={{fontSize:9,color:accent,fontWeight:700,textAlign:"center"}}>{sym}{Math.round(c.total/1000)}K</div>
                      ))}
                    </div>
                  </div>;
                })()}
              </div>
            </div>;
          })()}

          {/* ── COMPARE VIEW ── */}
          {statsView==="compare" && <div>
            {availableYears.length < 2
              ? <div style={{background:CARD,borderRadius:16,padding:24,textAlign:"center",border:`1px solid ${BORDER}`}}>
                  <div style={{fontSize:32,marginBottom:8}}>📊</div>
                  <div style={{color:TXT,fontWeight:600,marginBottom:4}}>{lang==="he"?"צריך לפחות 2 שנים":lang==="en"?"Need at least 2 years":"Se necesitan al menos 2 años"}</div>
                  <div style={{color:TXT3,fontSize:12}}>{lang==="he"?"הוסף נתונים משנים נוספות":lang==="en"?"Add data from more years":"Agregá datos de más años"}</div>
                </div>
              : <div>
                  {/* Year totals comparison */}
                  <div style={{background:CARD,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${BORDER}`}}>
                    <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>{lang==="he"?"השוואה שנתית":lang==="en"?"Annual comparison":"Comparación anual"}</div>
                    {availableYears.map((y,i)=>{
                      const total = yearTotal(parseInt(y));
                      const prevYear = availableYears[i-1];
                      const prevTotal = prevYear ? yearTotal(parseInt(prevYear)) : 0;
                      const diff = prevTotal>0 ? Math.round(((total-prevTotal)/prevTotal)*100) : null;
                      const colors=["#60a5fa","#4ade80","#f87171","#a78bfa","#fb923c"];
                      const color = colors[i%colors.length];
                      const maxTotal = Math.max(...availableYears.map(yr=>yearTotal(parseInt(yr))),1);
                      return <div key={y} style={{marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:13,fontWeight:700,color}}>{y}</span>
                            {diff!==null && <span style={{fontSize:11,color:diff>0?"#f87171":"#4ade80",fontWeight:600}}>
                              {diff>0?"▲":"▼"} {Math.abs(diff)}%
                            </span>}
                          </div>
                          <span style={{fontSize:14,fontWeight:700,color}}>{fmt(total,sym)}</span>
                        </div>
                        <div style={{height:14,background:SECBTN,borderRadius:7,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${(total/maxTotal)*100}%`,background:color,borderRadius:7,transition:"width .5s"}}/>
                        </div>
                        <div style={{fontSize:12,color:TXT3,marginTop:3}}>{lang==="he"?"ממוצע חודשי":lang==="en"?"Monthly avg":"Promedio"}: {fmt(Math.round(total/12),sym)}</div>
                      </div>;
                    })}
                  </div>

                  {/* Month by month comparison */}
                  <div style={{background:CARD,borderRadius:16,padding:16,border:`1px solid ${BORDER}`}}>
                    <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>{lang==="he"?"חודש לפי חודש":lang==="en"?"Month by month":"Mes a mes"}</div>
                    {Array.from({length:12},(_,i)=>{
                      const monthNum = String(i+1).padStart(2,"0");
                      const vals = availableYears.map(y=>({
                        year:y,
                        total:gastos.filter(g=>g.mes===`${y}-${monthNum}`).reduce((s,g)=>s+(g.monto||0),0)
                      }));
                      if(vals.every(v=>v.total===0)) return null;
                      const maxVal = Math.max(...vals.map(v=>v.total),1);
                      const colors=["#60a5fa","#4ade80","#f87171","#a78bfa"];
                      return <div key={i} style={{marginBottom:10}}>
                        <div style={{fontSize:11,fontWeight:600,color:TXT,marginBottom:4}}>{mNames[i]}</div>
                        {vals.map((v,j)=>(
                          <div key={v.year} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                            <div style={{fontSize:9,color:colors[j],width:30,flexShrink:0,fontWeight:700}}>{v.year}</div>
                            <div style={{flex:1,height:10,background:SECBTN,borderRadius:5,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${(v.total/maxVal)*100}%`,background:colors[j],borderRadius:5}}/>
                            </div>
                            <div style={{fontSize:10,color:v.total>0?colors[j]:TXT3,width:60,textAlign:"right",flexShrink:0}}>{v.total>0?fmt(Math.round(v.total),sym):"—"}</div>
                          </div>
                        ))}
                      </div>;
                    })}
                  </div>
                </div>
            }
          </div>}

          {/* ── CATEGORY VIEW ── */}
          {statsView==="category" && <div>
            <div style={{background:CARD,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>{lang==="he"?"סה\"כ לפי קטגוריה":lang==="en"?"Total by category":"Total por categoría"} — {statsYear}</div>
              {catTotalByYear(statsYear).map((cat,i)=>{
                const maxCat = catTotalByYear(statsYear)[0]?.total||1;
                const pct = Math.round((cat.total/maxCat)*100);
                const yearPct = yearTotal(statsYear)>0?Math.round((cat.total/yearTotal(statsYear))*100):0;
                return <div key={cat.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:16}}>{cat.icon}</span>
                      <span style={{fontSize:12,fontWeight:600,color:TXT}}>{cat.label}</span>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:13,fontWeight:700,color:cat.color||accent}}>{fmt(cat.total,sym)}</span>
                      <span style={{fontSize:10,color:TXT3,marginLeft:6}}>{yearPct}%</span>
                    </div>
                  </div>
                  <div style={{height:8,background:SECBTN,borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:cat.color||accent,borderRadius:4,transition:"width .3s"}}/>
                  </div>
                  <div style={{fontSize:12,color:TXT3,marginTop:3}}>{fmt(Math.round(cat.total/12),sym)}/{lang==="he"?"חודש":lang==="en"?"mo":"mes"}</div>
                </div>;
              })}
            </div>

            {/* Category evolution across years */}
            {availableYears.length>1 && <div style={{background:CARD,borderRadius:16,padding:16,border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:12,fontWeight:700,color:TXT,marginBottom:12}}>{lang==="he"?"אבולוציה לפי שנה":lang==="en"?"Evolution by year":"Evolución por año"}</div>
              {CATS.slice(0,8).map(cat=>{
                const vals = availableYears.map(y=>({year:y,total:Math.round(gastos.filter(g=>g.mes?.startsWith(y)&&g.categoria===cat.id).reduce((s,g)=>s+(g.monto||0),0))}));
                if(vals.every(v=>v.total===0)) return null;
                return <div key={cat.id} style={{marginBottom:12,padding:"8px 10px",background:INPUT,borderRadius:10,border:`1px solid ${INPBORD}`}}>
                  <div style={{fontSize:12,fontWeight:600,color:TXT,marginBottom:6}}>{cat.icon} {cat.label}</div>
                  <div style={{display:"flex",gap:10}}>
                    {vals.map((v,i)=>(
                      <div key={v.year} style={{flex:1,textAlign:"center"}}>
                        <div style={{fontSize:10,color:TXT3,marginBottom:2}}>{v.year}</div>
                        <div style={{fontSize:13,fontWeight:700,color:v.total>0?(cat.color||accent):TXT3}}>{v.total>0?fmt(v.total,sym):"—"}</div>
                      </div>
                    ))}
                  </div>
                </div>;
              })}
            </div>}
          </div>}

        </div>}

        {/* ── EXPENSES ── */}

              </button>
              <div style={{fontSize:11,color:TXT3,textAlign:"center"}}>
                {lang==="he"?"הוסף לדף הבית שלך — עובד ללא אינטרנט":lang==="en"?"Add to home screen — works offline":"Agregá al inicio — funciona sin internet"}

            </div>

            {/* Atzmai toggle */}

                <div style={{fontSize:13,fontWeight:600,color:TXT}}>🏪 Modo עצמאי / עסק</div>
                <div style={{fontSize:11,color:TXT3}}>Activa si trabajás de forma independiente</div>
              </div>
              <button onClick={()=>updateProfile({isAtzmai:!isAtzmaiEnabled})}
                style={{width:44,height:24,borderRadius:12,background:isAtzmaiEnabled?accent:"#94a3b8",border:"none",cursor:"pointer",position:"relative",transition:"background .3s",flexShrink:0}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:isAtzmaiEnabled?"23px":"3px",transition:"left .3s"}}/>
              </button>
            </div>

            {/* Remember me toggle */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:INPUT,borderRadius:12,padding:"12px 14px",marginBottom:12,border:`1px solid ${INPBORD}`}}>

                <div style={{fontSize:13,fontWeight:600,color:TXT}}>{`🔐 ${t.keepConnected}`}</div>
                <div style={{fontSize:11,color:TXT3}}>{lang==="he"?"נשאר מחובר בין ביקורים":lang==="ru"?"Оставаться в системе":lang==="en"?"Stay logged in between visits":"Seguir conectado entre visitas"}</div>
              </div>
              <button onClick={()=>{ const v=!rememberMe; setRememberMe(v); localStorage.setItem("fa_remember",JSON.stringify(v)); }}
                style={{width:44,height:24,borderRadius:12,background:rememberMe?accent:"#94a3b8",border:"none",cursor:"pointer",position:"relative",transition:"background .3s",flexShrink:0}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:rememberMe?"23px":"3px",transition:"left .3s"}}/>
              </button>
            </div>

            <button onClick={doLogout} style={{background:"#ef444422",color:"#f87171",padding:"6px 12px",fontSize:12,border:"1px solid #ef444444",borderRadius:12,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontWeight:700}}>{t.logout}</button>
          </div>

          {/* Recurring Alerts */}
          <div style={{background:CARD,borderRadius:18,padding:18,marginBottom:14,border:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontWeight:700,color:TXT}}>⏰ Alertas recurrentes</div>
              <button onClick={()=>setShowRecurring(v=>!v)} style={{background:`${accent}22`,border:`1px solid ${accent}44`,color:accent,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif"}}>+ Nueva</button>
            </div>
            <div style={{fontSize:12,color:TXT3,marginBottom:12}}>Recordatorios de pagos fijos: alquiler, luz, agua, etc.</div>

            {showRecurring && <div style={{background:INPUT,borderRadius:12,padding:14,marginBottom:12,border:`1px solid ${INPBORD}`}}>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:TXT3,marginBottom:4}}>Nombre del pago</div>
                <input value={recurringForm.name} onChange={e=>setRecurringForm(f=>({...f,name:e.target.value}))} placeholder="Alquiler, Luz, Agua..."

              </div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:TXT3,marginBottom:4}}>Día del mes</div>
                  <input type="number" min="1" max="31" value={recurringForm.day} onChange={e=>setRecurringForm(f=>({...f,day:parseInt(e.target.value)||1}))}
                    style={{width:"100%",background:CARD,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:TXT3,marginBottom:4}}>Monto (aprox)</div>
                  <input type="number" value={recurringForm.amount} onChange={e=>setRecurringForm(f=>({...f,amount:e.target.value}))} placeholder="0"
                    style={{width:"100%",background:CARD,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:TXT3,marginBottom:4}}>Categoría</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {CATS.slice(0,6).map(cat=>(
                    <button key={cat.id} onClick={()=>setRecurringForm(f=>({...f,category:cat.id}))}

                      {cat.icon} {cat.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>

                    if(!recurringForm.name) return;
                    const newAlerts=[...recurringAlerts,{...recurringForm,id:Date.now()}];
                    setRecurringAlerts(newAlerts);
                    setShowRecurring(false);
                    setRecurringForm({name:"",day:1,category:"rent",amount:""});
                    showToast("✅ Alerta creada");
                  }} style={{flex:2,background:`linear-gradient(135deg,${accent},${accent}bb)`,border:"none",color:"#0f172a",borderRadius:10,padding:"9px",cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontWeight:700,fontSize:13}}>

                </button>
              </div>
            </div>}

              const cat=getCat(a.category,CATS);
              const today=new Date().getDate();
              const daysUntil=a.day-today;
              const urgency=daysUntil<=0?"#f87171":daysUntil<=3?"#fb923c":accent;
              return <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${BORDER}`}}>
                <div style={{width:34,height:34,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:TXT}}>{a.name}</div>
                  <div style={{fontSize:11,color:TXT3}}>Día {a.day} · {a.amount?fmt(parseFloat(a.amount),sym):""} · <span style={{color:urgency,fontWeight:600}}>{daysUntil<0?"Vencido":daysUntil===0?"Hoy":daysUntil===1?"Mañana":`En ${daysUntil} días`}</span></div>
                </div>
                <button onClick={()=>setRecurringAlerts(prev=>prev.filter(r=>r.id!==a.id))} style={{background:"none",border:"none",color:TXT3,cursor:"pointer",fontSize:14}}>✕</button>
              </div>;
            })}
          </div>
        </>}

        {/* ── ADMIN ── */}
        {tab==="admin" && isAdmin && <>

          {/* Viewing user banner */}
          {viewingUser && <div style={{background:"#f8717122",borderRadius:12,padding:"12px 16px",marginBottom:14,border:"1px solid #f8717144",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,color:"#f87171",fontWeight:700}}>
                👁 {lang==="he"?"צופה בנתונים של:":lang==="en"?"Viewing data of:":"Viendo datos de:"} <span style={{color:TXT}}>{viewingUser.name}</span>
              </div>
              <div style={{fontSize:11,color:TXT3}}>{viewingUser.email}</div>
            </div>
            <button onClick={()=>{ setViewingUser(null); loadAll(); }}
              style={{background:"#f8717122",border:"1px solid #f8717144",color:"#f87171",borderRadius:10,padding:"6px 12px",cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:12,fontWeight:700}}>
              ✕ {lang==="he"?"חזור לנתונים שלי":lang==="en"?"Back to my data":"Volver a mis datos"}
            </button>
          </div>}

          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <Btn variant={adminTab==="users"?"primary":"secondary"} accent={accent} small onClick={()=>setAdminTab("users")}>👥 {t.users}</Btn>
            <Btn variant={adminTab==="roles"?"primary":"secondary"} accent={accent} small onClick={()=>setAdminTab("roles")}>🔑 Roles</Btn>
          </div>

          {adminTab==="users" && <>
            <div style={{fontSize:12,color:TXT3,marginBottom:12}}>{allUsers.length} {lang==="he"?"משתמשים רשומים":lang==="en"?"registered users":"usuarios registrados"}</div>
            {allUsers.map(u => <Card key={u.id} style={{padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:16,color:TXT}}>{u.name}</div>
                  <div style={{fontSize:11,color:TXT3}}>{u.email}</div>
                  <div style={{fontSize:10,marginTop:2,display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{background:u.role==="superadmin"?`${accent}22`:SECBTN,color:u.role==="superadmin"?accent:TXT2,borderRadius:4,padding:"2px 7px",fontWeight:600}}>{u.role}</span>
                    <span style={{color:TXT3}}>{u.created_at?.slice(0,10)}</span>
                  </div>
                </div>
                <div style={{textAlign:"right",display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                  <div style={{fontSize:11,color:TXT3}}>
                    {lang==="he"?"הוצאות:":lang==="en"?"Expenses:":"Gastos:"} <b style={{color:TXT}}>{gastos.filter(g=>g.user_id===u.id).length}</b>
                  </div>
                  {u.id !== session?.user?.id && <button
                    onClick={()=>{
                      setViewingUser(u);
                      loadUserData(u.id);
                      setTab("dashboard");
                    }}
                    style={{background:`${accent}22`,border:`1px solid ${accent}44`,color:accent,borderRadius:10,padding:"6px 12px",cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:12,fontWeight:700}}>
                    👁 {lang==="he"?"צפה בנתונים":lang==="en"?"View data":"Ver datos"}
                  </button>}
                  {u.id === session?.user?.id && <span style={{fontSize:11,color:TXT3}}>({lang==="he"?"אתה":lang==="en"?"You":"Vos"})</span>}
                </div>
              </div>
            </Card>)}
          </>}

          {adminTab==="roles" && <>
            <div style={{background:CARD,borderRadius:12,padding:14,marginBottom:14,fontSize:12,color:TXT3,lineHeight:1.6,border:`1px solid ${BORDER}`}}>
              💡 {lang==="he"?"לשינוי תפקידים, הרץ ב-Supabase SQL Editor:":lang==="en"?"To change roles, run in Supabase SQL Editor:":"Para cambiar roles, ejecutá en Supabase SQL Editor:"}<br/>
              <code style={{color:accent,fontSize:11}}>update public.profiles set role = 'superadmin' where email = 'email@ejemplo.com';</code>
            </div>
            {allUsers.map(u => <div key={u.id} style={{background:CARD,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${BORDER}`}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:TXT}}>{u.name}</div>
                <div style={{fontSize:11,color:TXT3}}>{u.email}</div>
              </div>
              <span style={{background:u.role==="superadmin"?`${accent}22`:SECBTN,color:u.role==="superadmin"?accent:TXT2,borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>{u.role}</span>
            </div>)}
          </>}
        </>}

      </div>

      {/* FAB — MyFinanda style: bottom left */}
      <button onClick={()=>{setExpForm({descripcion:"",monto:"",categoria:CATS[0]?.id||"kibud",nota:"",fecha:dateNow(),receiptUrl:"",paymentMethod:"cash",cardId:"",paidBy:"",installments:1,installmentsPaid:0});setEditGasto(null);setModal("expense");}}
        style={{position:"fixed",bottom:"calc(80px + env(safe-area-inset-bottom, 0px) + 8px)",left:20,width:58,height:58,borderRadius:"50%",background:accent,border:"none",color:"#fff",fontSize:30,cursor:"pointer",boxShadow:`0 6px 28px ${accent}66`,zIndex:21,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:300,lineHeight:1}}>+</button>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:NAV,borderTop:`1px solid ${NAVBORD}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom, 8px)"}}>
        {/* Tab 1: Dashboard/בית */}
        <button onClick={()=>{setTab("dashboard");setShowMoreMenu(false);}} style={{flex:1,padding:"12px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={tab==="dashboard"?accent:TXT3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
          <span style={{fontSize:12,fontWeight:600,color:tab==="dashboard"?accent:TXT3}}>{lang==="he"?"בית":lang==="en"?"Home":"Inicio"}</span>
          {tab==="dashboard" && <div style={{width:20,height:3,background:accent,borderRadius:2}}/>}
        </button>
        {/* Tab 2: Expenses/הוצאות */}
        <button onClick={()=>{setTab("expenses");setShowMoreMenu(false);}} style={{flex:1,padding:"12px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={tab==="expenses"?accent:TXT3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <span style={{fontSize:12,fontWeight:600,color:tab==="expenses"?accent:TXT3}}>{lang==="he"?"הוצאות":lang==="en"?"Expenses":"Gastos"}</span>
          {tab==="expenses" && <div style={{width:20,height:3,background:accent,borderRadius:2}}/>}
        </button>
        {/* Tab 3: Income/הכנסות */}
        <button onClick={()=>{setTab("income");setShowMoreMenu(false);}} style={{flex:1,padding:"12px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={tab==="income"?accent:TXT3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
          </svg>
          <span style={{fontSize:12,fontWeight:600,color:tab==="income"?accent:TXT3}}>{lang==="he"?"הכנסות":lang==="en"?"Income":"Ingresos"}</span>
          {tab==="income" && <div style={{width:20,height:3,background:accent,borderRadius:2}}/>}
        </button>
        {/* Tab 4: Stats/תובנות — next to More */}
        <button onClick={()=>{setTab("stats");setShowMoreMenu(false);}} style={{flex:1,padding:"12px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={tab==="stats"?accent:TXT3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
          </svg>
          <span style={{fontSize:12,fontWeight:600,color:tab==="stats"?accent:TXT3}}>{lang==="he"?"תובנות":lang==="en"?"Insights":"Stats"}</span>
          {tab==="stats" && <div style={{width:20,height:3,background:accent,borderRadius:2}}/>}
        </button>
        {/* Tab 5: More/עוד */}
        <button onClick={()=>setShowMoreMenu(v=>!v)} style={{flex:1,padding:"12px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={TABS.slice(4).some(tb=>tb.id===tab)||showMoreMenu?accent:TXT3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          <span style={{fontSize:12,fontWeight:600,color:TABS.slice(4).some(tb=>tb.id===tab)||showMoreMenu?accent:TXT3}}>
            {TABS.slice(4).find(tb=>tb.id===tab)?.label || t.more}
          </span>
          {(TABS.slice(4).some(tb=>tb.id===tab)||showMoreMenu) && <div style={{width:20,height:3,background:accent,borderRadius:2}}/>}
        </button>
      </div>

      {/* MORE MENU — closes when tapping outside or selecting item */}
      {showMoreMenu && <>
        {/* Backdrop */}
        <div style={{position:"fixed",inset:0,zIndex:18}} onClick={()=>setShowMoreMenu(false)}/>
        <div style={{position:"fixed",bottom:"calc(60px + env(safe-area-inset-bottom, 0px))",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:19}}>
          <div style={{background:NAV,borderTop:`1px solid ${NAVBORD}`,borderRadius:"16px 16px 0 0",paddingBottom:4,boxShadow:"0 -8px 30px #0004"}}>
            {TABS.slice(4).map((tb,i) => <button key={tb.id} onClick={()=>{setTab(tb.id);setShowMoreMenu(false);}}
              style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 24px",background:"none",border:"none",cursor:"pointer",borderBottom:i<TABS.slice(4).length-1?`1px solid ${NAVBORD}`:"none"}}>
              <span style={{fontSize:24}}>{tb.icon}</span>
              <span style={{fontSize:15,fontWeight:tab===tb.id?700:400,color:tab===tb.id?accent:TXT}}>{tb.label}</span>
              {tab===tb.id && <div style={{marginLeft:"auto",width:8,height:8,borderRadius:"50%",background:accent}}/>}
            </button>)}
          </div>
        </div>
      </>}

      {/* MODAL: EXPENSE */}
      {modal==="expense" && <Modal title={editGasto?`✏️ ${t.edit} gasto`:t.newExpense} onClose={()=>{setModal(null);setEditGasto(null);}} bg={MODBG} border={BORDER} secBtn={SECBTN} secBtnTxt={TXT2}>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.desc}</div><input value={expForm.descripcion} onChange={e=>setExpForm(f=>({...f,descripcion:e.target.value}))} placeholder="Rami Levy, Paz, YBC..." style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.amount} ({sym})</div><input type="text" inputMode="decimal" value={expForm.monto} onChange={e=>{const v=e.target.value.replace(",",".");setExpForm(f=>({...f,monto:v}));}} placeholder="0.00" style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.date}</div><input type="date" value={expForm.fecha} onChange={e=>setExpForm(f=>({...f,fecha:e.target.value}))} style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.notesOpt}</div><input value={expForm.nota} onChange={e=>setExpForm(f=>({...f,nota:e.target.value}))} placeholder={t.detailsOptional} style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:10,color:TXT3,textTransform:"uppercase",letterSpacing:1}}>{t.cat}</div>
            <button onClick={()=>{setCatModal(true);setEditCat(null);setCatForm({id:"",label:"",icon:"🛒",color:"#4ade80"});}}
              style={{background:`${accent}22`,border:`1px solid ${accent}44`,color:accent,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif"}}>
              + {t.newCategory}
            </button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {CATS.map((cat,i) => <button key={cat.id} onClick={()=>setExpForm(f=>({...f,categoria:cat.id}))} style={{background:expForm.categoria===cat.id?cat.color+"33":INPUT,border:`2px solid ${expForm.categoria===cat.id?cat.color:INPBORD}`,borderRadius:12,padding:"10px 4px",cursor:"pointer",transition:"all .15s"}}>
              <div style={{fontSize:20}}>{cat.icon}</div>
              <div style={{fontSize:9,color:expForm.categoria===cat.id?cat.color:TXT3,fontWeight:600,marginTop:3}}>{cat.label}</div>
            </button>)}
          </div>
        </div>

        {/* Payment method */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:TXT3,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{t.paymentMethod}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {[["cash","💵",t.cash],["transfer","🏦",t.bankTransfer],["card","💳",t.creditCard],["voucher","🎫",t.voucher],["installments","📋",t.installments]].map(([val,icon,label])=>(
              <button key={val} onClick={()=>setExpForm(f=>({...f,paymentMethod:val,cardId:val==="card"?f.cardId:""}))}
                style={{background:expForm.paymentMethod===val?`${accent}22`:INPUT,border:`1px solid ${expForm.paymentMethod===val?accent:INPBORD}`,borderRadius:10,padding:"8px 10px",cursor:"pointer",fontSize:12,fontWeight:expForm.paymentMethod===val?700:400,color:expForm.paymentMethod===val?accent:TXT,fontFamily:"'Rubik',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                {icon} {label}
              </button>
            ))}
          </div>

          {/* Credit card selector */}
          {expForm.paymentMethod==="card" && <div style={{marginBottom:8}}>
            {creditCards.length===0
              ? <div style={{fontSize:12,color:TXT3,display:"flex",alignItems:"center",gap:8}}>
                  <span>{lang==="he"?"אין כרטיסים":lang==="en"?"No cards":"Sin tarjetas"}</span>
                  <button onClick={()=>setShowCardManager(true)} style={{background:`${accent}22`,border:`1px solid ${accent}44`,color:accent,borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontWeight:700}}>+ {t.addCard}</button>
                </div>
              : <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {creditCards.map(card=>(
                    <button key={card.id} onClick={()=>setExpForm(f=>({...f,cardId:card.id}))}
                      style={{background:expForm.cardId===card.id?card.color+"33":INPUT,border:`2px solid ${expForm.cardId===card.id?card.color:INPBORD}`,borderRadius:10,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:expForm.cardId===card.id?700:400,color:expForm.cardId===card.id?card.color:TXT,fontFamily:"'Rubik',sans-serif"}}>
                      💳 {card.name} {card.last4?"··"+card.last4:""}
                    </button>
                  ))}
                  <button onClick={()=>setShowCardManager(true)} style={{background:INPUT,border:`1px solid ${INPBORD}`,borderRadius:10,padding:"7px 10px",cursor:"pointer",fontSize:11,color:TXT3,fontFamily:"'Rubik',sans-serif"}}>⚙️</button>
                </div>
            }
          </div>}

          {/* Installments */}
          {expForm.paymentMethod==="installments" && <div style={{background:INPUT,borderRadius:12,padding:12,border:`1px solid ${INPBORD}`}}>
            <div style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.installmentsNum}</div>
                <input type="number" min="2" max="72" value={expForm.installments||1}
                  onChange={e=>setExpForm(f=>({...f,installments:parseInt(e.target.value)||1}))}
                  style={{width:"100%",background:CARD,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"8px 10px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.installmentsPaid}</div>
                <input type="number" min="0" max={expForm.installments||1} value={expForm.installmentsPaid||0}
                  onChange={e=>setExpForm(f=>({...f,installmentsPaid:parseInt(e.target.value)||0}))}
                  style={{width:"100%",background:CARD,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"8px 10px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
              </div>
            </div>
            {expForm.installments>1 && <div style={{fontSize:11,color:accent,textAlign:"center"}}>
              {(expForm.installments||1)-(expForm.installmentsPaid||0)} {t.installmentsLeft} · {expForm.monto?fmt((parseFloat(expForm.monto)||0)/(expForm.installments||1),sym):""}  {lang==="he"?"לתשלום":lang==="en"?"per installment":"/cuota"}
            </div>}
          </div>}
        </div>

        {/* Receipt photo in manual form */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:TXT3,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>📎 {lang==="he"?"צרף קבלה":lang==="ru"?"Прикрепить чек":lang==="en"?"Attach receipt":"Adjuntar recibo"}</div>
          {expForm.receiptUrl
            ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <img src={expForm.receiptUrl} style={{width:60,height:60,borderRadius:10,objectFit:"cover",border:`1px solid ${BORDER}`}} onError={e=>e.target.style.display="none"}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#4ade80",marginBottom:4}}>✓ {lang==="he"?"קבלה מצורפת":lang==="ru"?"Чек прикреплён":lang==="en"?"Receipt attached":"Recibo adjunto"}</div>
                  <button onClick={()=>setExpForm(f=>({...f,receiptUrl:""}))} style={{background:"none",border:"none",color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"'Rubik',sans-serif"}}>✕ {lang==="he"?"הסר":lang==="ru"?"Удалить":lang==="en"?"Remove":"Quitar"}</button>
                </div>
              </div>
            : <button onClick={()=>{ const inp=document.getElementById("manualReceiptInput"); inp?.click(); }}
                style={{width:"100%",background:INPUT,border:`1px dashed ${INPBORD}`,color:TXT3,borderRadius:12,padding:"12px",cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{fontSize:20}}>📷</span>
                <span>{lang==="he"?"צלם או העלה קבלה":lang==="ru"?"Сфотографировать или загрузить":lang==="en"?"Take or upload photo":"Sacar o subir foto del recibo"}</span>
              </button>
          }
          <input id="manualReceiptInput" type="file" accept="image/*" style={{display:"none"}}
            onChange={async e=>{
              const file=e.target.files?.[0]; if(!file) return;
              const ext=(file.name||"r.jpg").split(".").pop();
              const path=`${session.user.id}/${Date.now()}.${ext}`;
              const {error} = await sb.storage.from("receipts").upload(path,file,{contentType:file.type});
              if(!error){setExpForm(f=>({...f,receiptUrl:path}));} // store path
              e.target.value="";
            }}/>
        </div>

        {/* Who paid - only if family mode enabled */}
        {familyEnabled && familyMembers.length>0 && <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:TXT3,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{t.paidBy}</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {/* Me option */}
            <button onClick={()=>setExpForm(f=>({...f,paidBy:""}))}
              style={{background:expForm.paidBy===""?`${accent}22`:INPUT,border:`1px solid ${expForm.paidBy===""?accent:INPBORD}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:expForm.paidBy===""?700:400,color:expForm.paidBy===""?accent:TXT,fontFamily:"'Rubik',sans-serif",display:"flex",alignItems:"center",gap:6}}>
              👤 {t.you}
            </button>
            {familyMembers.map(m=>(
              <button key={m.id} onClick={()=>setExpForm(f=>({...f,paidBy:m.id}))}
                style={{background:expForm.paidBy===m.id?m.color+"33":INPUT,border:`1px solid ${expForm.paidBy===m.id?m.color:INPBORD}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:expForm.paidBy===m.id?700:400,color:expForm.paidBy===m.id?m.color:TXT,fontFamily:"'Rubik',sans-serif",display:"flex",alignItems:"center",gap:6}}>
                {m.emoji} {m.name}
              </button>
            ))}
          </div>
        </div>}

        <Btn accent={accent} onClick={saveExpense} disabled={saving}>{saving?"⏳...":t.save}</Btn>
      </Modal>}
      {showCardManager && <Modal title={`💳 ${t.managecards}`} onClose={()=>setShowCardManager(false)} bg={MODBG} border={BORDER} secBtn={SECBTN} secBtnTxt={TXT2}>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.cardName}</div>
          <input value={cardForm.name} onChange={e=>setCardForm(f=>({...f,name:e.target.value}))} placeholder={lang==="he"?"ויזה כאל, מסטרקארד...":lang==="en"?"Visa Cal, Mastercard...":"Visa Cal, Mastercard..."}
            style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div>
            <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.cardLast4}</div>
            <input type="number" maxLength={4} value={cardForm.last4||""} onChange={e=>setCardForm(f=>({...f,last4:e.target.value.slice(0,4)}))} placeholder="1234"
              style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.chargeDate}</div>
            <input type="number" min="1" max="31" value={cardForm.chargeDay||""} onChange={e=>setCardForm(f=>({...f,chargeDay:parseInt(e.target.value)||1}))} placeholder="10"
              style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.creditLimit} (₪)</div>
            <input type="number" value={cardForm.limit||""} onChange={e=>setCardForm(f=>({...f,limit:e.target.value}))} placeholder="10000"
              style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.debt} (₪)</div>
            <input type="number" value={cardForm.debt||""} onChange={e=>setCardForm(f=>({...f,debt:e.target.value}))} placeholder="0"
              style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:10,color:TXT3,marginBottom:4}}>{t.interest}</div>
            <input type="number" step="0.1" value={cardForm.interest||""} onChange={e=>setCardForm(f=>({...f,interest:e.target.value}))} placeholder="2.5"
              style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:10,padding:"9px 12px",fontSize:13,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:TXT3,marginBottom:8}}>{lang==="he"?"צבע":lang==="en"?"Color":"Color"}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["#60a5fa","#4ade80","#f472b6","#fb923c","#a78bfa","#f87171","#facc15","#34d399"].map(c=>(
              <button key={c} onClick={()=>setCardForm(f=>({...f,color:c}))} style={{width:32,height:32,borderRadius:"50%",background:c,border:`3px solid ${cardForm.color===c?"#f8fafc":"transparent"}`,cursor:"pointer"}}/>
            ))}
          </div>
        </div>
        <button onClick={()=>{
          if(!cardForm.name) return;
          const card={id:Date.now(),name:cardForm.name,last4:cardForm.last4||"",color:cardForm.color,chargeDay:cardForm.chargeDay||1,limit:parseFloat(cardForm.limit)||0,debt:parseFloat(cardForm.debt)||0,interest:parseFloat(cardForm.interest)||0};
          setCreditCards(prev=>[...prev,card]);
          setCardForm({name:"",last4:"",color:"#60a5fa",limit:"",chargeDay:1,debt:"",interest:""});
          showToast("✅ " + t.addCard);
        }} style={{width:"100%",background:`linear-gradient(135deg,${accent},${accent}bb)`,border:"none",color:"#0f172a",borderRadius:12,padding:"13px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:14,marginBottom:12}}>
          + {t.addCard}
        </button>

        {/* Cards list with stats */}
        {creditCards.map(card=>{
          const cardTotal = gastosMes.filter(g=>g.card_id===card.id).reduce((s,g)=>s+(g.monto||0),0);
          const usedPct = card.limit>0?Math.min((cardTotal/card.limit)*100,100):0;
          const daysUntilCharge = card.chargeDay - new Date().getDate();
          return <div key={card.id} style={{background:INPUT,borderRadius:12,padding:12,marginBottom:10,border:`1px solid ${INPBORD}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:card.color,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:TXT}}>{card.name} {card.last4?"··"+card.last4:""}</div>
                  <div style={{fontSize:10,color:TXT3}}>{t.chargeDate}: {card.chargeDay} · {daysUntilCharge>0?`${lang==="he"?"בעוד":lang==="en"?"in":"en"} ${daysUntilCharge} ${lang==="he"?"ימים":lang==="en"?"days":"días"}`:lang==="he"?"היום/עבר":lang==="en"?"today/passed":"hoy/pasó"}</div>
                </div>
              </div>
              <button onClick={()=>setCreditCards(prev=>prev.filter(c=>c.id!==card.id))} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            {card.limit>0 && <>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                <span style={{color:TXT3}}>{t.creditLimit}: {fmt(card.limit,sym)}</span>
                <span style={{color:usedPct>80?"#f87171":accent}}>{fmt(cardTotal,sym)} ({Math.round(usedPct)}%)</span>
              </div>
              <div style={{height:6,background:SECBTN,borderRadius:3,overflow:"hidden",marginBottom:6}}>
                <div style={{height:"100%",width:`${usedPct}%`,background:usedPct>80?"#f87171":card.color,borderRadius:3}}/>
              </div>
            </>}
            {card.debt>0 && <div style={{background:"#f8717115",borderRadius:8,padding:"6px 10px",fontSize:11,color:"#f87171"}}>
              💳 {t.debt}: {fmt(card.debt,sym)}
              {card.interest>0 && ` · ${t.interest}: ${fmt(card.debt*(card.interest/100),sym)}/mes`}
            </div>}
          </div>;
        })}
      </Modal>}

      {/* MODAL: GOAL */}
      {modal==="goal" && <Modal title={editGoalId?`✏️ ${t.edit} meta`:t.addGoal} onClose={()=>{setModal(null);setEditGoalId(null);}} bg={MODBG} border={BORDER} secBtn={SECBTN} secBtnTxt={TXT2}>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.goalName}</div><input value={goalForm.name} onChange={e=>setGoalForm(f=>({...f,name:e.target.value}))} placeholder="Vacaciones, fondo emergencia..." style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:TXT3,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{t.goalType}</div>
          <div style={{display:"flex",gap:8}}>
            {[["savings","🏦 "+t.savings],["investment","📈 "+t.investment]].map(([v,l]) => <button key={v} onClick={()=>setGoalForm(f=>({...f,type:v}))} style={{flex:1,background:goalForm.type===v?`${accent}22`:INPUT,border:`1px solid ${goalForm.type===v?accent:INPBORD}`,borderRadius:10,padding:"11px",cursor:"pointer",color:goalForm.type===v?accent:TXT,fontWeight:goalForm.type===v?700:400,fontSize:13,fontFamily:"'Rubik',sans-serif",transition:"all .15s"}}>{l}</button>)}
          </div>
        </div>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.target} ({sym})</div><input type="number" value={goalForm.target} onChange={e=>setGoalForm(f=>({...f,target:e.target.value}))} placeholder="5000" style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.current} ({sym})</div><input type="number" value={goalForm.current} onChange={e=>setGoalForm(f=>({...f,current:e.target.value}))} placeholder="0" style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <div style={{marginBottom:13}}><div style={{fontSize:13,color:TXT3,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{t.deadline}</div><input type="date" value={goalForm.deadline} onChange={e=>setGoalForm(f=>({...f,deadline:e.target.value}))} style={{width:"100%",background:INPUT,border:`1px solid ${INPBORD}`,color:TXT,borderRadius:12,padding:"11px 14px",fontSize:16,boxSizing:"border-box",fontFamily:"'Rubik',sans-serif",outline:"none"}}/></div>
        <Btn accent={accent} onClick={saveGoal}>{t.save}</Btn>
      </Modal>}

      {/* HIDDEN INPUTS for camera/gallery */}
      <input id="cameraInput" type="file" accept="image/*" capture="environment" style={{display:"none"}}
        onChange={e=>{handleReceiptImage(e.target.files?.[0]); e.target.value="";}}/>
      <input id="galleryInput" type="file" accept="image/*" style={{display:"none"}}
        onChange={e=>{handleReceiptImage(e.target.files?.[0]); e.target.value="";}}/>

      {/* MODAL: SCAN OPTIONS */}
      {modal==="scanOptions" && <Modal title={`📷 ${t.scan}`} onClose={()=>setModal(null)} bg={MODBG} border={BORDER} secBtn={SECBTN} secBtnTxt={TXT2}>
        <div style={{fontSize:12,color:TXT3,marginBottom:18,textAlign:"center"}}>{lang==="he"?"איך להוסיף את הקבלה?":lang==="ru"?"Как добавить чек?":lang==="en"?"How do you want to add the receipt?":"¿Cómo querés agregar el recibo?"}</div>

        {/* Camera button */}
        <button onClick={()=>{setModal(null); setTimeout(()=>document.getElementById("cameraInput")?.click(),100);}}
          style={{width:"100%",background:`linear-gradient(135deg,${accent},${accent}bb)`,border:"none",color:"#0f172a",borderRadius:14,padding:"18px",fontWeight:700,cursor:"pointer",fontFamily:"'Rubik',sans-serif",fontSize:15,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <span style={{fontSize:28}}>📷</span>

                  const entry = {merchant:expForm.descripcion, category:cat.id, correctedAt:dateNow()};
                  if(idx>=0) learned[idx]=entry; else learned.push(entry);

            </div>

          {/* Option 2 */}
          <div style={{background:CARD,borderRadius:12,padding:14,marginBottom:10,border:`1px solid ${BORDER}`}}>

              <div>

        <div style={{fontSize:12,color:TXT3,marginBottom:12,lineHeight:1.6}}>

          const txt = document.getElementById("emailPasteArea").value;

              method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true","x-api-key":anthropicKey},
              body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:
                `Analyze this email text and extract expense information. Text: "${txt}"\n\nExtract: total amount (number only), merchant/company name, date (YYYY-MM-DD, today ${dateNow()} if not found), best category from: supermarket,fuel,business,confiteria,electricity,gas,water,arnona,building,rent,other.\n\nRespond ONLY with JSON no markdown: {"amount":0,"merchant":"","date":"${dateNow()}","category":"other","items":[]}`
              }]})

            const data = await resp.json();
            const parsed = JSON.parse((data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());

            setExpForm({descripcion:parsed.merchant||t.purchase, monto:String(parsed.amount||""), categoria:parsed.category||CATS[0]?.id||"other", nota:(parsed.items||[]).join(", "), fecha:parsed.date||dateNow()});
