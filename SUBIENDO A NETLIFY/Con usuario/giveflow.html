<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiveFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f1ee;color:#1a1a18;min-height:100vh;direction:rtl}
.nav{display:flex;align-items:center;padding:12px 20px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.10)}
.nav-logo{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#0F6E56}
.nav-logo span{color:#1D9E75}
.org-bar{width:100%;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.10);display:flex;align-items:center;justify-content:center;padding:12px 0;min-height:72px;overflow:hidden}
.org-bar img{max-height:58px;max-width:92%;object-fit:contain}
.wrap{max-width:460px;margin:0 auto;padding:28px 20px 60px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.10);border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:16px}
.lbl{font-size:11px;font-weight:500;color:#5a5a55;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.inp{padding:11px 14px;border:0.5px solid rgba(0,0,0,0.18);border-radius:8px;font-size:22px;font-family:'DM Sans',sans-serif;background:#fff;color:#1a1a18;outline:none;width:100%;-moz-appearance:textfield;font-weight:500}
.inp::-webkit-outer-spin-button,.inp::-webkit-inner-spin-button{-webkit-appearance:none}
.inp:focus{border-color:#1D9E75}
.sym-row{display:flex;align-items:center;gap:8px}
.sym{font-size:22px;font-weight:500;color:#1D9E75;min-width:20px}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.name-inp{padding:10px 14px;border:0.5px solid rgba(0,0,0,0.18);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:#1a1a18;outline:none;width:100%}
.name-inp:focus{border-color:#1D9E75}
.anon-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.anon-row input{width:16px;height:16px;accent-color:#1D9E75;cursor:pointer}
.anon-row label{font-size:13px;color:#5a5a55;cursor:pointer}
.donate-btn{width:100%;padding:15px;background:#1D9E75;color:white;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.donate-btn:hover{background:#0F6E56}
.method-btn{width:100%;padding:12px;border:0.5px solid rgba(0,0,0,0.18);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:#1a1a18;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.method-btn:hover{background:#f6f7f5}
.err{font-size:12px;color:#D85A30;text-align:center;display:none}
.note{font-size:11px;color:#8a8a83;text-align:center;line-height:1.5}
.footer-note{font-size:11px;color:#8a8a83;text-align:center;margin-top:14px;line-height:1.6;display:none}
.prog-section{background:#fff;border:0.5px solid rgba(0,0,0,0.10);border-radius:12px;padding:16px;margin-bottom:16px;display:none}
.prog-bar{background:#f0f1ee;border-radius:99px;height:10px;overflow:hidden;margin:7px 0}
.prog-fill{height:100%;border-radius:99px;background:#1D9E75;transition:width .4s}
.bank-box{background:#f6f7f5;border-radius:8px;padding:12px;font-size:13px;line-height:1.8;display:none}
.divider{display:flex;align-items:center;gap:10px;color:#8a8a83;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(0,0,0,0.12)}
</style>
</head>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M7.076 21.337H2.47a.641.641 0 01-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 00-.607-.541c-.013.076-.026.175-.041.254-.93 4.778-4.005 7.201-9.138 7.201h-2.19a.563.563 0 00-.556.479l-1.187 7.527h-.506l-.24 1.516a.56.56 0 00.554.647h3.882c.46 0 .85-.334.922-.788.06-.26.76-4.852.816-5.09a.932.932 0 01.923-.788h.58c3.76 0 6.705-1.528 7.565-5.946.36-1.847.174-3.388-.777-4.471z"/></svg>
      &#x05D4;&#x05DE;&#x05E9;&#x05DA; &#x05DC;&#x05EA;&#x05E9;&#x05DC;&#x05D5;&#x05DD;
    </button>

    <div id="extra-btns" style="display:flex;flex-direction:column;gap:8px"></div>
    <div class="bank-box" id="bank-box"></div>

    <p class="note" id="note"><i class="ti ti-lock"></i> &#x05EA;&#x05E9;&#x05DC;&#x05D5;&#x05DD; &#x05DE;&#x05D0;&#x05D5;&#x05D1;&#x05D8;&#x05D7; &#x05D3;&#x05E8;&#x05DA; PayPal</p>
  </div>
  <div class="footer-note" id="footer-note"></div>
</div>

<script>
var PAYPAL = "https://www.paypal.com/donate/?hosted_button_id=BBK68XNXTDF8A";
var SUPA_URL = "https://ynpacufijpcumloodjir.supabase.co";
var SUPA_KEY = "sbpublishable_EyDKwtYUHdAWhSauesA90A_SO-Xv-FT";
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);
var cfg = {};

function donate(method) {
  var amt = parseFloat(document.getElementById('amount').value);
  var err = document.getElementById('err');
  if (!amt || amt <= 0) {
    err.style.display = 'block';
    document.getElementById('amount').focus();
    return;
  }
  err.style.display = 'none';
  if (method === 'paypal') {
    var url = PAYPAL + '&currency_code=' + (cfg.currency || 'ILS') + '&amount=' + amt.toFixed(2);
    window.open(url, '_blank');
  }
}

function openLink(url) {
  var amt = parseFloat(document.getElementById('amount').value);
  if (amt > 0) url += (url.indexOf('?') > -1 ? '&' : '?') + 'amount=' + amt.toFixed(2);
  window.open(url, '_blank');
}

async function loadSettings() {
  try {
    var r = await sb.from('giveflow_settings').select('*').eq('id','default').single();
    if (!r.data) return;
    cfg = r.data;
    var syms = {ILS:'₪', USD:'$', EUR:'€', GBP:'£'};
    if (cfg.currency) document.getElementById('sym').textContent = syms[cfg.currency] || '₪';
    if (cfg.org_logo) document.getElementById('org-img').src = cfg.org_logo;
    if (cfg.txt_privacy) document.getElementById('note').innerHTML = '<i class="ti ti-lock"></i> ' + cfg.txt_privacy;
    if (cfg.txt_footer) { document.getElementById('footer-note').textContent = cfg.txt_footer; document.getElementById('footer-note').style.display = 'block'; }
    var extra = document.getElementById('extra-btns');
    extra.innerHTML = '';
    if (cfg.bit_enabled && cfg.bit_link) {
      var b1 = document.createElement('button'); b1.className = 'method-btn';
      b1.innerHTML = '<span style="background:#0070BA;color:white;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px">bit</span> תשלום עם Bit';
      b1.onclick = function(){ openLink(cfg.bit_link); }; extra.appendChild(b1);
    }
    if (cfg.paybox_enabled && cfg.paybox_link) {
      var b2 = document.createElement('button'); b2.className = 'method-btn';
      b2.innerHTML = '<span style="background:#FF6B35;color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">PB</span> תשלום עם PayBox';
      b2.onclick = function(){ openLink(cfg.paybox_link); }; extra.appendChild(b2);
    }
    if (cfg.grow_enabled && cfg.grow_link) {
      var b3 = document.createElement('button'); b3.className = 'method-btn';
      b3.innerHTML = '<span style="background:#22C55E;color:white;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px">G</span> תשלום עם Grow';
      b3.onclick = function(){ openLink(cfg.grow_link); }; extra.appendChild(b3);
    }
    if (cfg.bank_enabled && cfg.bank_name) {
      var b4 = document.createElement('button'); b4.className = 'method-btn';
      b4.innerHTML = '<i class="ti ti-building-bank"></i> העברה בנקאית';
      b4.onclick = function(){ document.getElementById('bank-box').style.display = document.getElementById('bank-box').style.display === 'block' ? 'none' : 'block'; };
      extra.appendChild(b4);
      var det = [cfg.bank_name, 'סניף ' + cfg.bank_branch, 'חשבון ' + cfg.bank_account, cfg.bank_holder].filter(Boolean).join(' | ');
      document.getElementById('bank-box').innerHTML = '<strong>פרטי בנק:</strong><br>' + det;
    }
    if (cfg.camp_enabled && cfg.camp_name && cfg.camp_goal > 0) {
      var pct = Math.min(100, Math.round((cfg.camp_raised / cfg.camp_goal) * 100));
      document.getElementById('prog-section').style.display = 'block';
      document.getElementById('camp-name').textContent = cfg.camp_name;
      document.getElementById('camp-pct').textContent = pct + '%';
      document.getElementById('prog-fill').style.width = pct + '%';
      var sym = syms[cfg.currency] || '₪';
      document.getElementById('camp-raised').textContent = sym + Number(cfg.camp_raised).toLocaleString() + ' גויסו';
      document.getElementById('camp-goal').textContent = 'מתוך ' + sym + Number(cfg.camp_goal).toLocaleString();
    }
  } catch(e) { console.log('Settings error:', e); }
}

loadSettings();
</script>
</body>
</html>
